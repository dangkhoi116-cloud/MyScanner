name: Build APK
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: unzip -o MyScanner-project.zip -d project
      - run: find project -name ".fuse_hidden*" -delete || true
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'
      - run: cd project/MyScanner && gradle assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: MyScanner-apk
          path: project/MyScanner/app/build/outputs/apk/debug/app-debug.apk
